<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <style>
        .tarjeta-menu { padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
    </style>
</head>
<body>
    <header class="barra-superior" id="barra-alumno"></header>

    <main class="contenido">
        <h1>Seguridad</h1>
        
        <div class="menu-grid">
            <div class="tarjeta-menu" style="max-width: 600px;"> 
                <h2>Cambiar mi contraseña</h2>
                <p>Escribí tu nueva contraseña a continuación:</p>
                
                <input type="password" id="inputPassword" placeholder="Nueva contraseña" 
                       style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                
                <button id="btnGuardar" onclick="actualizarContrasena()" 
                        style="width: 100%; padding: 12px; background-color: #0d6efd; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                    Guardar cambios
                </button>
                
                <p id="mensaje" style="margin-top: 15px; text-align: center; font-weight: bold;"></p>

                <div id="contenedor-volver" style="text-align: center; margin-top: 20px; display: none;">
                    <a href="/pages/Alumno/menu_alumno.html" 
                       style="padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">
                       &larr; Volver al menú
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/sesion_alumno.js"></script>
    <script>
        async function actualizarContrasena() {
            const inputPass = document.getElementById("inputPassword");
            const mensaje = document.getElementById("mensaje");
            const btnGuardar = document.getElementById("btnGuardar");
            const contenedorVolver = document.getElementById("contenedor-volver");

            const nuevaPassword = inputPass.value;
            if (!nuevaPassword) {
                mensaje.innerText = "Por favor, ingresa una contraseña.";
                mensaje.style.color = "red";
                return;
            }

            const legajo = SesionAlumno.legajo();
            let token = sessionStorage.getItem('auth_token');

            try {
                const response = await fetch(`http://localhost:8080/alumnos/${legajo}/password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(nuevaPassword) 
                });

                if (response.ok) {
                    mensaje.innerText = "¡Contraseña actualizada con éxito!";
                    mensaje.style.color = "green";
                    
                    // Lógica para mostrar el botón de volver
                    inputPass.style.display = "none";
                    btnGuardar.style.display = "none";
                    contenedorVolver.style.display = "block";
                } else {
                    const errorText = await response.text();
                    mensaje.innerText = "Error: " + errorText;
                    mensaje.style.color = "red";
                }
            } catch (error) {
                mensaje.innerText = "Error de conexión.";
                mensaje.style.color = "red";
            }
        }
    </script>
</body>
</html>
