<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfesoresAdmin</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <script src="/js/api.js" defer></script>
    <script src="/js/navbar_admin.js" defer></script>
    <script src="/js/sesion_admin.js" defer></script>
    <script src="/js/profesores_admin.js" defer></script>
</head>
<body>
    <header class="barra-superior" id="barra-admin"></header>

    <main class="contenido">
        <h1>Gestion Profesores</h1>

        <div class="acciones">
            <button class="btn" id="btn-agregar">Agregar profesor</button>

            <div class="buscador">
                <select id="campo-filtro" title="Campo por el que buscar">
                    <option value="apellido">Apellido</option>
                    <option value="nombre">Nombre</option>
                    <option value="dni">Dni</option>
                    <option value="email">Email</option>
                </select>
                <input type="text" id="filtro">
                <select id="filtro-estado" title="Filtrar por estado">
                    <option value="">Todos los estados</option>
                    <option value="ACTIVO">Activo</option>
                    <option value="INACTIVO">Inactivo</option>
                    <option value="LICENCIA">Licencia</option>
                </select>
                <button class="btn" id="btn-buscar" title="Buscar">Buscar</button>
            </div>
        </div>

        <p id="mensaje" class="mensaje" hidden></p>

        <table class="tabla-datos">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Dni</th>
                    <th>Telefono</th>
                    <th>Mail</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>

    <dialog id="dialogo-profesor">
        <form id="form-profesor" class="formulario">
            <h2>Agregar profesor</h2>

            <label>
                Nombre
                <input type="text" name="nombre" required>
            </label>
            <label>
                Apellido
                <input type="text" name="apellido" required>
            </label>
            <label>
                Dni
                <input type="text" name="dni" required>
            </label>
            <label>
                Telefono
                <input type="text" name="telefono">
            </label>
            <label>
                Mail
                <input type="email" name="email">
            </label>
            <label>
                Fecha nacimiento
                <input type="date" name="fechaNacimiento">
            </label>
            <label>
                Horas semanales
                <input type="number" name="horasSemanales">
            </label>
            <label>
                Estado
                <select name="estadoProfesor" required>
                    <option value="ACTIVO">Activo</option>
                    <option value="INACTIVO">Inactivo</option>
                    <option value="LICENCIA">Licencia</option>
                </select>
            </label>

            <div class="formulario-botones">
                <button type="button" class="btn" id="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn btn-primario">Guardar</button>
            </div>
        </form>
    </dialog>

    <dialog id="dialogo-perfil">
        <form id="form-perfil" class="formulario formulario-perfil">
            <h2>Perfil del profesor</h2>

            <label>
                Id
                <input type="number" name="idPersona" readonly>
            </label>
            <label>
                Nombre
                <input type="text" name="nombre" required>
            </label>
            <label>
                Apellido
                <input type="text" name="apellido" required>
            </label>
            <label>
                Dni
                <input type="text" name="dni" required>
            </label>
            <label>
                Telefono
                <input type="text" name="telefono">
            </label>
            <label>
                Email
                <input type="email" name="email">
            </label>
            <label>
                Fecha nacimiento
                <input type="date" name="fechaNacimiento">
            </label>
            <label>
                Horas semanales
                <input type="number" name="horasSemanales">
            </label>
            <label>
                Estado
                <select name="estadoProfesor" required>
                    <option value="ACTIVO">Activo</option>
                    <option value="INACTIVO">Inactivo</option>
                    <option value="LICENCIA">Licencia</option>
                </select>
            </label>

            <div class="formulario-botones">
                <button type="button" class="btn" id="btn-cerrar-perfil">Cerrar</button>
                <button type="submit" class="btn btn-primario">Guardar cambios</button>
            </div>
        </form>
    </dialog>

    <footer class="barra-inferior"></footer>
</body>
</html>
