<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorrelatividadesAdmin</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <script src="/js/api.js" defer></script>
    <script src="/js/navbar_admin.js" defer></script>
    <script src="/js/sesion_admin.js" defer></script>
    <script src="/js/correlatividades_admin.js" defer></script>
</head>
<body>
    <header class="barra-superior" id="barra-admin"></header>

    <main class="contenido">
        <h1>Gestion Correlatividades</h1>

        <div class="acciones">
            <button class="btn" id="btn-agregar">Agregar correlatividad</button>

            <div class="buscador">
                <select id="filtro-materia" title="Filtrar por materia">
                    <option value="">Todas las materias</option>
                </select>
                <button class="btn" id="btn-buscar">Filtrar</button>
                <button class="btn" id="btn-ver-todas">Ver todas</button>
            </div>
        </div>

        <p id="mensaje" class="mensaje" hidden></p>

        <table class="tabla-datos">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Materia</th>
                    <th>Correlativa</th>
                    <th>Para cursar</th>
                    <th>Para rendir</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>

    <!-- ===== Dialogo: agregar correlatividad ===== -->
    <dialog id="dialogo-correlatividad">
        <form id="form-correlatividad" class="formulario">
            <h2>Agregar correlatividad</h2>

            <label>
                Materia
                <select name="idMateria" required>
                    <option value="">Elegi una materia...</option>
                </select>
            </label>
            <label>
                Materia correlativa
                <select name="idMateriaCorrelativa" required>
                    <option value="">Elegi una materia...</option>
                </select>
            </label>
            <label>
                Para cursar necesita
                <select name="estadoParaCursar">
                    <option value="">Sin requisito</option>
                    <option value="CURSADA">Cursada</option>
                    <option value="REGULAR">Regular</option>
                    <option value="APROBADA">Aprobada</option>
                </select>
            </label>
            <label>
                Para rendir necesita
                <select name="estadoParaRendir">
                    <option value="">Sin requisito</option>
                    <option value="CURSADA">Cursada</option>
                    <option value="REGULAR">Regular</option>
                    <option value="APROBADA">Aprobada</option>
                </select>
            </label>

            <div class="formulario-botones">
                <button type="button" class="btn" id="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn btn-primario">Guardar</button>
            </div>
        </form>
    </dialog>

    <footer class="barra-inferior"></footer>
</body>
</html>
